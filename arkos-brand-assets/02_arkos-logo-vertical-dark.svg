<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <title>ARKOS — Logo Vertical · Fundo Escuro</title>
  <!-- Fundo (remova este rect se quiser fundo transparente) -->
  <rect width="400" height="340" fill="#0A0C0F"/>

  <!-- SÍMBOLO — centralizado em x=200 -->
  <!-- Perna esquerda -->
  <line x1="200" y1="30" x2="140" y2="160" stroke="#F4F2ED" stroke-width="14" stroke-linecap="round"/>
  <!-- Perna direita -->
  <line x1="200" y1="30" x2="260" y2="160" stroke="#F4F2ED" stroke-width="14" stroke-linecap="round"/>
  <!-- Barra de Sinal -->
  <line x1="157" y1="110" x2="243" y2="110" stroke="#C8F542" stroke-width="10" stroke-linecap="round"/>
  <!-- Ápice -->
  <circle cx="200" cy="30" r="9" fill="#C8F542"/>

  <!-- WORDMARK -->
  <text
    x="200" y="220"
    text-anchor="middle"
    font-family="'DM Mono', 'Courier New', monospace"
    font-weight="500"
    font-size="52"
    letter-spacing="18"
    fill="#F4F2ED">ARKOS</text>

  <!-- TAGLINE -->
  <text
    x="200" y="262"
    text-anchor="middle"
    font-family="'DM Mono', 'Courier New', monospace"
    font-weight="400"
    font-size="11"
    letter-spacing="4"
    fill="#5A5F6A">DATA · INTELLIGENCE · DECISION</text>
</svg>
