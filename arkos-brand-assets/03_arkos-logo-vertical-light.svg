<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <title>ARKOS — Logo Vertical · Fundo Claro</title>
  <!-- Fundo (remova este rect se quiser fundo transparente) -->
  <rect width="400" height="340" fill="#F4F2ED"/>

  <!-- SÍMBOLO -->
  <line x1="200" y1="30" x2="140" y2="160" stroke="#0A0C0F" stroke-width="14" stroke-linecap="round"/>
  <line x1="200" y1="30" x2="260" y2="160" stroke="#0A0C0F" stroke-width="14" stroke-linecap="round"/>
  <!-- Barra de Sinal (versão escura do verde para contraste em claro) -->
  <line x1="157" y1="110" x2="243" y2="110" stroke="#7FAA10" stroke-width="10" stroke-linecap="round"/>
  <!-- Ápice -->
  <circle cx="200" cy="30" r="9" fill="#7FAA10"/>

  <!-- WORDMARK -->
  <text
    x="200" y="220"
    text-anchor="middle"
    font-family="'DM Mono', 'Courier New', monospace"
    font-weight="500"
    font-size="52"
    letter-spacing="18"
    fill="#0A0C0F">ARKOS</text>

  <!-- TAGLINE -->
  <text
    x="200" y="262"
    text-anchor="middle"
    font-family="'DM Mono', 'Courier New', monospace"
    font-weight="400"
    font-size="11"
    letter-spacing="4"
    fill="#8A8F99">DATA · INTELLIGENCE · DECISION</text>
</svg>
