<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <title>ARKOS — Paleta Cromática</title>
  <rect width="800" height="420" fill="#0A0C0F"/>

  <!-- TÍTULO -->
  <text x="40" y="48" font-family="'DM Mono','Courier New',monospace" font-size="11" letter-spacing="3" fill="#5A5F6A">ARKOS · PALETA CROMÁTICA OFICIAL</text>

  <!-- SWATCHES linha 1 — tons escuros -->
  <!-- Obsidiana -->
  <rect x="40"  y="72" width="110" height="180" rx="8" fill="#0A0C0F" stroke="#272D38" stroke-width="1"/>
  <text x="95"  y="280" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5A5F6A">Obsidiana</text>
  <text x="95"  y="296" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">#0A0C0F</text>
  <text x="95"  y="312" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">Fundo Principal</text>

  <!-- Grafite -->
  <rect x="168" y="72" width="110" height="180" rx="8" fill="#111318"/>
  <text x="223" y="280" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5A5F6A">Grafite</text>
  <text x="223" y="296" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">#111318</text>
  <text x="223" y="312" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">Superfície / Cards</text>

  <!-- Ardósia -->
  <rect x="296" y="72" width="110" height="180" rx="8" fill="#1F242D"/>
  <text x="351" y="280" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5A5F6A">Ardósia</text>
  <text x="351" y="296" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">#1F242D</text>
  <text x="351" y="312" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">Hover / Elevado</text>

  <!-- Névoa -->
  <rect x="424" y="72" width="110" height="180" rx="8" fill="#8A8F99"/>
  <text x="479" y="280" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5A5F6A">Névoa</text>
  <text x="479" y="296" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">#8A8F99</text>
  <text x="479" y="312" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">Texto Secundário</text>

  <!-- Pergaminho -->
  <rect x="552" y="72" width="110" height="180" rx="8" fill="#F4F2ED"/>
  <text x="607" y="280" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5A5F6A">Pergaminho</text>
  <text x="607" y="296" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">#F4F2ED</text>
  <text x="607" y="312" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">Texto Principal</text>

  <!-- Verde Sinal -->
  <rect x="680" y="72" width="80" height="180" rx="8" fill="#C8F542"/>
  <text x="720" y="280" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="11" fill="#5A5F6A">Sinal</text>
  <text x="720" y="296" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">#C8F542</text>
  <text x="720" y="312" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#3A3F4A">Acento Único</text>

  <!-- Variações do verde -->
  <rect x="680" y="72"  width="80" height="44" rx="8" fill="#C8F542"/>
  <rect x="680" y="116" width="80" height="44" fill="#A8D422"/>
  <rect x="680" y="160" width="80" height="44" fill="#7FAA10"/>
  <rect x="680" y="204" rx-bottom="8" width="80" height="44" fill="#5A8000"/>
  <!-- Arredondar apenas os cantos de baixo do último -->

  <text x="720" y="340" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="9" fill="#3A3F4A">#C8F542 Digital</text>
  <text x="720" y="352" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="9" fill="#3A3F4A">#A8D422 Hover</text>
  <text x="720" y="364" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="9" fill="#3A3F4A">#7FAA10 Impresso</text>
  <text x="720" y="376" text-anchor="middle" font-family="'DM Mono','Courier New',monospace" font-size="9" fill="#3A3F4A">Pantone 382 C</text>

  <!-- LINHA BASE -->
  <line x1="40" y1="400" x2="760" y2="400" stroke="#272D38" stroke-width="0.5"/>
  <text x="40" y="416" font-family="'DM Mono','Courier New',monospace" font-size="9" fill="#3A3F4A">Uso: 60% Obsidiana · 30% Tons Escuros · 10% Verde Sinal — O sinal é escasso porque sinal escasso vale mais.</text>
</svg>
